name: e_commerce_app
description: A new Flutter project.
publish_to: none
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0" # تم التحديث لدعم Flutter 3.x و Null Safety

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Dependency Injection
  get_it: ^7.7.0
  injectable: ^2.5.0

  # Networking & Data
  http: ^1.6.0
  shared_preferences: ^2.2.2
  equatable: ^2.0.5

  # UI & UX
  flutter_svg: ^2.0.10
  skeletonizer: ^2.1.3
  flutter_native_splash: ^2.4.0
  smooth_page_indicator: ^1.1.0
  animate_do: ^3.3.4
  toastification: ^2.0.0
  responsive_builder: ^0.7.1

  # State Management
  provider: ^6.1.2

  # Utils
  logger: ^2.4.0
  bloc: ^9.2.0
  flutter_bloc: ^9.1.1
  cached_network_image: ^3.4.1
  marquee: ^2.3.0
  dots_indicator: ^4.0.1
  hive: ^2.2.3
  hive_flutter: ^1.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  injectable_generator: ^2.10.0

  # Codegen: hive_generator_io works with current build_runner / analyzer (hive_generator is unmaintained).
  # Regenerate: flutter pub run build_runner build --delete-conflicting-outputs --force-aot
  # (or: dart run build_runner ...). --force-aot avoids missing `frontend_server.dart.snapshot` on Dart 3.11+.
  build_runner: ^2.4.15
  frontend_server_client: ^4.0.0
  hive_generator_io: ^3.2.2

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
    - assets/image/